{% extends 'base.html' %}

{% block content %}
<section style="min-height: 80vh; display: flex; align-items: center; position: relative;">
    <div class="animate-float" style="position: absolute; top: 20%; right: 20%; width: 250px; height: 250px; background: radial-gradient(circle, rgba(168, 85, 247, 0.15), transparent 70%); border-radius: 50%; filter: blur(40px); pointer-events: none;"></div>
    
    <div class="container-sm page-enter">
        <div class="card-glass" style="max-width: 480px; margin: 0 auto; padding: var(--space-10); position: relative; overflow: hidden; border: 1px solid rgba(168, 85, 247, 0.3);">
            <!-- Top accent bar -->
            <div style="position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, #a855f7, #ec4899);"></div>
            
            <div class="text-center mb-8">
                <div style="width: 64px; height: 64px; border-radius: 50%; background: var(--bg-tertiary); display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; border: 1px solid var(--border-color);">
                    <i data-lucide="shield-check" style="width: 32px; height: 32px; color: #a855f7;"></i>
                </div>
                <h1 style="font-size: var(--text-2xl); font-weight: 700;">Admin Portal Access</h1>
                <p class="text-muted mt-2 text-sm">Secure login for platform administrators</p>
            </div>

            <form method="post" id="admin-login-form">
                {% csrf_token %}

                {% if form.errors %}
                <div class="alert alert-error mb-6">
                    Invalid credentials or access denied.
                </div>
                {% endif %}

                <div class="form-group">
                    <label class="form-label" for="login-username">Admin Email / Username</label>
                    {{ form.username }}
                </div>
                <div class="form-group">
                    <label class="form-label" for="login-password">Password</label>
                    {{ form.password }}
                </div>

                <button type="submit" class="btn btn-gradient btn-lg w-full mt-6" style="background: linear-gradient(135deg, #a855f7, #ec4899);" id="login-submit">
                    <i data-lucide="lock" style="width: 18px; height: 18px; margin-right: 8px;"></i>
                    Authenticate →
                </button>
            </form>
            
            <div class="text-center mt-6" style="padding-top: var(--space-6); border-top: 1px solid var(--border-subtle);">
                <a href="{% url 'pages:home' %}" style="color: var(--text-muted); font-size: var(--text-sm); display: flex; align-items: center; justify-content: center; gap: 0.5rem; text-decoration: none;">
                    <i data-lucide="arrow-left" style="width: 14px; height: 14px;"></i> Return to Website
                </a>
            </div>
        </div>
    </div>
</section>

<script>
    // Initialize icons if not already done
    document.addEventListener('DOMContentLoaded', () => {
        if (typeof lucide !== 'undefined') {
            lucide.createIcons();
        }
    });
</script>
{% endblock %}
